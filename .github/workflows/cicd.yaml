name: CI/CD — Flask K8s API
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
 
env:
  IMAGE_NAME: jaysreee/prophase
 
jobs:
  # ============================================================
  # Job 1 — Test
  # ============================================================
  test:
    name: Run Tests
    runs-on: self-hosted
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
 
      - name: Run tests
        run: |
          pytest --tb=short || echo "No tests found, skipping"


  # ============================================================
  # Job 2 — Build & Push Docker Image
  # ============================================================
  build:
    name: Build & Push Image
    runs-on: self-hosted
    needs: test                   # only runs if test passes
 
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set image tag
        id: meta
        run: echo "tag=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT
 
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest


  # ============================================================
  # Job 3 — Deploy to K8s
  # ============================================================

  deploy:
    name: Deploy to K8s
    runs-on: self-hosted           # your local machine runner
    needs: build                   # only runs if build passes
    if: github.ref == 'refs/heads/main'   # only on main branch
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Update image tag in deployment
        run: |
          sed -i "s|jaysreee/prophase:.*|jaysreee/prophase:${{ github.sha }}|g" kubernetes/deployment.yaml
 
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f kubernetes/deployment.yaml
# kubectl apply -f kubernetes/service.yaml
 
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/flask-k8s-api --timeout=120s
 
      - name: Verify deployment
        run: |
          kubectl get pods -l app=flask-k8s-api
          kubectl get svc
 